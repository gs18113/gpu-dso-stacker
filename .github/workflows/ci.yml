      - name: Package GUI
        run: |
          chmod +x bundled_bin/dso_stacker
          pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-linux-x86_64-gpu
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (Windows CPU-only) — PyInstaller bundle with CPU CLI binary
  # ==================================================================
  gui-windows-cpu:
    runs-on: windows-2022
    needs: windows
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
