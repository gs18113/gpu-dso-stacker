      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-windows-x86_64-cpu
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (Windows GPU-selectable) — PyInstaller bundle with GPU CLI binary
  # ==================================================================
  gui-windows-gpu:
    runs-on: windows-2022
    needs: windows
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
