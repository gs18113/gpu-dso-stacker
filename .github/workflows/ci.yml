name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================================================================
  # Linux: build CLI + run tests inside nvidia/cuda container
  # ==================================================================
  linux:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake gcc g++ pkg-config git curl ca-certificates \
            libtiff-dev libpng-dev zlib1g-dev \
            libcurl4-openssl-dev libomp-dev

      - uses: actions/checkout@v4

      - name: Cache CFITSIO 4.6.3
        uses: actions/cache@v4
        id: cfitsio-cache
        with:
          path: /opt/cfitsio
          key: cfitsio-4.6.3-linux-x86_64

      - name: Build CFITSIO from source
        if: steps.cfitsio-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.3.tar.gz | tar xz
          cd cfitsio-4.6.3
          ./configure --prefix=/opt/cfitsio --disable-curl
          make -j$(nproc)
          make install

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" \
            -DCMAKE_INSTALL_PREFIX=install
        env:
          CFITSIO_PREFIX: /opt/cfitsio
          PKG_CONFIG_PATH: /opt/cfitsio/lib/pkgconfig

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure -V

      - name: Install
        run: cmake --install build

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-linux-x86_64
          path: install/bin/dso_stacker

  # ==================================================================
  # Windows: build CLI + run tests using vcpkg + CUDA Toolkit
  # ==================================================================
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.6.2'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "npp", "npp_dev", "visual_studio_integration"]'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_CUDA_COMPILER="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc.exe" `
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" `
            -DCMAKE_INSTALL_PREFIX=install

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        run: cd build && ctest --output-on-failure -V -C Release

      - name: Collect binaries and DLLs
        shell: bash
        run: |
          mkdir -p artifact
          cp build/Release/dso_stacker.exe artifact/
          # Copy vcpkg DLLs needed at runtime
          for dll in build/Release/*.dll; do
            [ -f "$dll" ] && cp "$dll" artifact/
          done

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-windows-x86_64
          path: artifact/

  # ==================================================================
  # GUI package (Linux) — PyInstaller bundle with CLI binary
  # ==================================================================
  gui-linux:
    runs-on: ubuntu-22.04
    needs: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-linux-x86_64
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: |
          chmod +x bundled_bin/dso_stacker
          pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-linux-x86_64
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (Windows) — PyInstaller bundle with CLI binary
  # ==================================================================
  gui-windows:
    runs-on: windows-2022
    needs: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-windows-x86_64
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-windows-x86_64
          path: dist/DSOStacker/
