      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-windows-x86_64-gpu
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (macOS arm64 CPU-only) — PyInstaller bundle with CPU CLI binary
  # ==================================================================
  gui-macos-cpu:
    runs-on: macos-14
    needs: macos-metal
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
