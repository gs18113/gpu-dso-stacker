name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==================================================================
  # Linux: build GPU-selectable + CPU-only CLI binaries
  # ==================================================================
  linux:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake gcc g++ pkg-config git curl ca-certificates \
            libtiff-dev libpng-dev zlib1g-dev \
            libcurl4-openssl-dev libomp-dev

      - uses: actions/checkout@v4

      - name: Cache CFITSIO 4.6.3
        uses: actions/cache@v4
        id: cfitsio-cache
        with:
          path: /opt/cfitsio
          key: cfitsio-4.6.3-linux-x86_64

      - name: Build CFITSIO from source
        if: steps.cfitsio-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.3.tar.gz | tar xz
          cd cfitsio-4.6.3
          ./configure --prefix=/opt/cfitsio --disable-curl
          make -j$(nproc)
          make install

      - name: Configure CMake (GPU-selectable)
        run: |
          cmake -B build-gpu \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" \
            -DCMAKE_INSTALL_PREFIX=install-gpu
        env:
          CFITSIO_PREFIX: /opt/cfitsio
          PKG_CONFIG_PATH: /opt/cfitsio/lib/pkgconfig

      - name: Build (GPU-selectable)
        run: cmake --build build-gpu --parallel $(nproc)

      - name: Run tests (GPU-selectable)
        run: cd build-gpu && ctest --output-on-failure -V

      - name: Install (GPU-selectable)
        run: cmake --install build-gpu

      - name: Configure CMake (CPU-only)
        run: |
          cmake -B build-cpu \
            -DCMAKE_BUILD_TYPE=Release \
            -DDSO_ENABLE_CUDA=OFF \
            -DCMAKE_INSTALL_PREFIX=install-cpu
        env:
          CFITSIO_PREFIX: /opt/cfitsio
          PKG_CONFIG_PATH: /opt/cfitsio/lib/pkgconfig

      - name: Build (CPU-only)
        run: cmake --build build-cpu --parallel $(nproc)

      - name: Run focused tests (CPU-only)
        run: cd build-cpu && ctest --output-on-failure -V -R "test_pipeline_backend|test_cpu|test_star_detect|test_debayer_cpu|test_color|test_image_io"

      - name: Install (CPU-only)
        run: cmake --install build-cpu

      - name: Upload GPU-selectable CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-linux-x86_64-gpu
          path: install-gpu/bin/dso_stacker

      - name: Upload CPU-only CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-linux-x86_64-cpu
          path: install-cpu/bin/dso_stacker

      - name: Upload star_detect_overlay binary
        uses: actions/upload-artifact@v4
        with:
          name: star-detect-overlay-linux-x86_64
          path: build-gpu/star_detect_overlay

  # ==================================================================
  # Windows: build GPU-selectable + CPU-only CLI binaries
  # ==================================================================
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.6.2'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "npp", "npp_dev", "visual_studio_integration"]'

      - name: Setup vcpkg
        id: setup-vcpkg-1
        continue-on-error: true
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Retry setup vcpkg on transient failure
        if: steps.setup-vcpkg-1.outcome == 'failure'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Configure CMake (GPU-selectable)
        run: |
          cmake -B build-gpu -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_CUDA_COMPILER="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc.exe" `
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" `
            -DCMAKE_INSTALL_PREFIX=install-gpu

      - name: Build (GPU-selectable)
        run: cmake --build build-gpu --config Release --parallel

      - name: Run tests (GPU-selectable)
        run: cd build-gpu && ctest --output-on-failure -V -C Release

      - name: Collect GPU-selectable binaries and DLLs
        shell: bash
        run: |
          mkdir -p artifact-gpu
          cp build-gpu/Release/dso_stacker.exe artifact-gpu/
          cp build-gpu/Release/star_detect_overlay.exe artifact-gpu/
          # Copy vcpkg DLLs needed at runtime
          for dll in build-gpu/Release/*.dll; do
            [ -f "$dll" ] && cp "$dll" artifact-gpu/
          done

      - name: Configure CMake (CPU-only)
        run: |
          cmake -B build-cpu -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DDSO_ENABLE_CUDA=OFF `
            -DCMAKE_INSTALL_PREFIX=install-cpu

      - name: Build (CPU-only)
        run: cmake --build build-cpu --config Release --parallel

      - name: Run focused tests (CPU-only)
        run: cd build-cpu && ctest --output-on-failure -V -C Release -R "test_pipeline_backend|test_cpu|test_star_detect|test_debayer_cpu|test_color|test_image_io"

      - name: Collect CPU-only binaries and DLLs
        shell: bash
        run: |
          mkdir -p artifact-cpu
          cp build-cpu/Release/dso_stacker.exe artifact-cpu/
          for dll in build-cpu/Release/*.dll; do
            [ -f "$dll" ] && cp "$dll" artifact-cpu/
          done

      - name: Upload GPU-selectable CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-windows-x86_64-gpu
          path: artifact-gpu/

      - name: Upload CPU-only CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-windows-x86_64-cpu
          path: artifact-cpu/

      - name: Upload star_detect_overlay binary
        uses: actions/upload-artifact@v4
        with:
          name: star-detect-overlay-windows-x86_64
          path: |
            artifact-gpu/star_detect_overlay.exe
            artifact-gpu/*.dll

  # ==================================================================
  # macOS (Apple Silicon): build Metal-enabled + CPU-only CLI binaries
  # ==================================================================
  macos-metal:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install cfitsio libtiff libpng pkg-config libomp

      - name: Configure CMake (Metal-enabled, CUDA off)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          cmake -B build-metal \
            -DCMAKE_BUILD_TYPE=Release \
            -DDSO_ENABLE_CUDA=OFF \
            -DDSO_ENABLE_METAL=ON \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}" \
            -DOpenMP_ROOT="${LIBOMP_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX=install-metal

      - name: Build (Metal-enabled)
        run: cmake --build build-metal --parallel

      - name: Run focused tests (Metal-enabled)
        run: cd build-metal && ctest --output-on-failure -V -R "test_pipeline_backend|test_cpu|test_star_detect|test_debayer_cpu|test_color|test_image_io"

      - name: Install (Metal-enabled)
        run: cmake --install build-metal

      - name: Configure CMake (CPU-only)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          cmake -B build-cpu \
            -DCMAKE_BUILD_TYPE=Release \
            -DDSO_ENABLE_CUDA=OFF \
            -DDSO_ENABLE_METAL=OFF \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}" \
            -DOpenMP_ROOT="${LIBOMP_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX=install-cpu

      - name: Build (CPU-only)
        run: cmake --build build-cpu --parallel

      - name: Run focused tests (CPU-only)
        run: cd build-cpu && ctest --output-on-failure -V -R "test_pipeline_backend|test_cpu|test_star_detect|test_debayer_cpu|test_color|test_image_io"

      - name: Install (CPU-only)
        run: cmake --install build-cpu

      - name: Upload Metal-enabled CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-macos-arm64-metal
          path: install-metal/bin/dso_stacker

      - name: Upload CPU-only CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-macos-arm64-cpu
          path: install-cpu/bin/dso_stacker

  # ==================================================================
  # GUI package (Linux CPU-only) — PyInstaller bundle with CPU CLI binary
  # ==================================================================
  gui-linux-cpu:
    runs-on: ubuntu-22.04
    needs: linux
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-linux-x86_64-cpu
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: |
          chmod +x bundled_bin/dso_stacker
          pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-linux-x86_64-cpu
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (Linux GPU-selectable) — PyInstaller bundle with GPU CLI binary
  # ==================================================================
  gui-linux-gpu:
    runs-on: ubuntu-22.04
    needs: linux
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
