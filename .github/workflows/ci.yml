          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (macOS arm64 Metal-enabled) — PyInstaller bundle with Metal CLI binary
  # ==================================================================
  gui-macos-metal:
    runs-on: macos-14
    needs: macos-metal
    permissions:
