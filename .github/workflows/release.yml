name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  # ==================================================================
  # Linux: build CLI inside nvidia/cuda container
  # ==================================================================
  linux:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.6.2-devel-ubuntu22.04
    steps:
      - name: Install system packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            cmake gcc g++ pkg-config git curl ca-certificates \
            libtiff-dev libpng-dev zlib1g-dev \
            libcurl4-openssl-dev libomp-dev

      - uses: actions/checkout@v4

      - name: Cache CFITSIO 4.6.3
        uses: actions/cache@v4
        id: cfitsio-cache
        with:
          path: /opt/cfitsio
          key: cfitsio-4.6.3-linux-x86_64

      - name: Build CFITSIO from source
        if: steps.cfitsio-cache.outputs.cache-hit != 'true'
        run: |
          curl -L https://heasarc.gsfc.nasa.gov/FTP/software/fitsio/c/cfitsio-4.6.3.tar.gz | tar xz
          cd cfitsio-4.6.3
          ./configure --prefix=/opt/cfitsio --disable-curl
          make -j$(nproc)
          make install

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc \
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" \
            -DCMAKE_INSTALL_PREFIX=install
          cmake --build build --parallel $(nproc)
          cmake --install build
        env:
          CFITSIO_PREFIX: /opt/cfitsio
          PKG_CONFIG_PATH: /opt/cfitsio/lib/pkgconfig

      - name: Run tests
        run: cd build && ctest --output-on-failure -V

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-linux-x86_64
          path: install/bin/dso_stacker

      - name: Upload ransac_status binary
        uses: actions/upload-artifact@v4
        with:
          name: ransac-status-linux-x86_64
          path: build/ransac_status

  # ==================================================================
  # Windows: build CLI using vcpkg + CUDA Toolkit
  # ==================================================================
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        id: cuda-toolkit
        with:
          cuda: '12.6.2'
          method: 'network'
          sub-packages: '["nvcc", "cudart", "npp", "npp_dev", "visual_studio_integration"]'

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Install vcpkg dependencies
        run: vcpkg install --triplet x64-windows

      - name: Build
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_CUDA_COMPILER="${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin/nvcc.exe" `
            -DDSO_CUDA_ARCHITECTURES="61;70;75;80;86;89" `
            -DCMAKE_INSTALL_PREFIX=install
          cmake --build build --config Release --parallel

      - name: Run tests
        run: cd build && ctest --output-on-failure -V -C Release

      - name: Collect binaries and DLLs
        shell: bash
        run: |
          mkdir -p artifact
          cp build/Release/dso_stacker.exe artifact/
          cp build/Release/ransac_status.exe artifact/
          for dll in build/Release/*.dll; do
            [ -f "$dll" ] && cp "$dll" artifact/
          done

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-windows-x86_64
          path: artifact/

      - name: Upload ransac_status binary
        uses: actions/upload-artifact@v4
        with:
          name: ransac-status-windows-x86_64
          path: |
            artifact/ransac_status.exe
            artifact/*.dll

  # ==================================================================
  # macOS (Apple Silicon): Metal scaffold build + focused CPU tests
  # ==================================================================
  macos-metal:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Homebrew dependencies
        run: |
          brew update
          brew install cfitsio libtiff libpng pkg-config libomp

      - name: Build (Metal scaffold, CUDA off)
        run: |
          BREW_PREFIX="$(brew --prefix)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDSO_ENABLE_CUDA=OFF \
            -DDSO_ENABLE_METAL=ON \
            -DCMAKE_PREFIX_PATH="${BREW_PREFIX}" \
            -DOpenMP_ROOT="${LIBOMP_PREFIX}" \
            -DCMAKE_INSTALL_PREFIX=install
          cmake --build build --parallel
          cmake --install build

      - name: Run focused tests
        run: cd build && ctest --output-on-failure -V -R "test_pipeline_backend|test_cpu|test_star_detect|test_debayer_cpu|test_color|test_image_io"

      - name: Upload CLI binary
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-macos-arm64
          path: install/bin/dso_stacker

  # ==================================================================
  # GUI package (Linux)
  # ==================================================================
  gui-linux:
    runs-on: ubuntu-22.04
    needs: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-linux-x86_64
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: |
          chmod +x bundled_bin/dso_stacker
          pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-linux-x86_64
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (Windows)
  # ==================================================================
  gui-windows:
    runs-on: windows-2022
    needs: windows
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-windows-x86_64
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-windows-x86_64
          path: dist/DSOStacker/

  # ==================================================================
  # GUI package (macOS arm64)
  # ==================================================================
  gui-macos:
    runs-on: macos-14
    needs: macos-metal
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/GUI/requirements.txt

      - name: Download CLI binary
        uses: actions/download-artifact@v4
        with:
          name: dso-stacker-macos-arm64
          path: bundled_bin/

      - name: Install Python dependencies
        run: pip install PySide6 pyyaml pyinstaller

      - name: Package GUI
        run: |
          chmod +x bundled_bin/dso_stacker
          pyinstaller dso_stacker_gui.spec

      - name: Upload GUI bundle
        uses: actions/upload-artifact@v4
        with:
          name: dso-stacker-gui-macos-arm64
          path: dist/DSOStacker/

  # ==================================================================
  # Create GitHub Release with all artifacts
  # ==================================================================
  create-release:
    runs-on: ubuntu-22.04
    needs: [linux, windows, macos-metal, gui-linux, gui-windows, gui-macos]
    steps:
      - name: Validate manual release tag is new
        if: github.event_name == 'workflow_dispatch'
        env:
          TAG_NAME: v${{ github.event.inputs.version }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /tmp/tag.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/git/ref/tags/${TAG_NAME}")
          if [ "$code" = "200" ]; then
            echo "Tag ${TAG_NAME} already exists. Re-run the tag-triggered release or choose a new version."
            exit 1
          fi
          if [ "$code" != "404" ]; then
            echo "Failed to validate tag availability. GitHub API returned HTTP ${code}."
            cat /tmp/tag.json
            exit 1
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create archives
        run: |
          tar czf dso-stacker-cli-linux-x86_64.tar.gz   -C dso-stacker-linux-x86_64 .
          tar czf dso-stacker-cli-macos-arm64.tar.gz    -C dso-stacker-macos-arm64 .
          tar czf dso-stacker-gui-linux-x86_64.tar.gz    -C dso-stacker-gui-linux-x86_64 .
          tar czf dso-stacker-gui-macos-arm64.tar.gz     -C dso-stacker-gui-macos-arm64 .
          cd dso-stacker-windows-x86_64 && zip -r ../dso-stacker-cli-windows-x86_64.zip . && cd ..
          cd dso-stacker-gui-windows-x86_64 && zip -r ../dso-stacker-gui-windows-x86_64.zip . && cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          generate_release_notes: true
          files: |
            dso-stacker-cli-linux-x86_64.tar.gz
            dso-stacker-cli-macos-arm64.tar.gz
            dso-stacker-gui-linux-x86_64.tar.gz
            dso-stacker-gui-macos-arm64.tar.gz
            dso-stacker-cli-windows-x86_64.zip
            dso-stacker-gui-windows-x86_64.zip
